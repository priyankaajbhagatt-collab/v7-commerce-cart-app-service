apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: v7-commerce-cart-app-service
  description: Cart orchestration service (v7) — manages cart lifecycle, item validation, pricing, and checkout initiation for APAC markets.
  annotations:
    # ── Source control ────────────────────────────────────────────────────────
    github.com/project-slug: priyankaajbhagatt-collab/v7-commerce-cart-app-service
    backstage.io/techdocs-ref: dir:.
    # ── CI/CD ─────────────────────────────────────────────────────────────────
    aws.amazon.com/aws-codepipeline-tags: Service=v7-commerce-cart-app-service
    argocd/app-selector: service=v7-commerce-cart-app-service
    argocd/app-name: v7-commerce-cart-app-service-mys
    # ── Environment URLs ──────────────────────────────────────────────────────
    amway.io/dev-url: https://v7-commerce-cart-app-service.dev.amway.io
    amway.io/qa-url: https://v7-commerce-cart-app-service.qa.amway.io
    amway.io/uat-url: https://v7-commerce-cart-app-service.uat.amway.io
    amway.io/prod-url: https://cart.amway.com
    # ── Observability ─────────────────────────────────────────────────────────
    amway.io/dynatrace-url: https://dynatrace.amway.com/ui/apps/dynatrace.classic.entity-overview?entity=SERVICE-v7cartapp
    amway.io/grafana-url: https://grafana.amway.com/d/v7-cart/v7-commerce-cart-app-service
    amway.io/victorops-url: https://portal.victorops.com/ui/amway/teams/nextgen-cart-team
    amway.io/confluence-url: https://amway.atlassian.net/wiki/spaces/NGCART/pages/runbook-v7-cart
    amway.io/jira-url: https://amway.atlassian.net/jira/software/projects/CART/boards
    amway.io/slack-channel: commerce-cart-alerts
    # ── Container registry ────────────────────────────────────────────────────
    amway.io/ecr-url: https://us-east-1.console.aws.amazon.com/ecr/repositories/private/v7-commerce-cart-app-service?region=us-east-1
    # ── Service metadata ──────────────────────────────────────────────────────
    amway.io/language: Node.js 20 / Fastify
    amway.io/markets: mys,tw,sg
    amway.io/envs: dev,qa,uat,prod
  links:
    - title: GitHub repository
      url: https://github.com/priyankaajbhagatt-collab/v7-commerce-cart-app-service
      icon: github
    - title: Open PRs
      url: https://github.com/priyankaajbhagatt-collab/v7-commerce-cart-app-service/pulls
      icon: github
    - title: Slack — #commerce-cart-general
      url: https://slack.com/app_redirect?channel=commerce-cart-general
      icon: chat
    - title: Slack — #commerce-cart-approval
      url: https://slack.com/app_redirect?channel=commerce-cart-approval
      icon: chat
    - title: CodePipeline (us-east-1)
      url: https://us-east-1.console.aws.amazon.com/codesuite/codepipeline/pipelines/v7-commerce-cart-app-service-us-east-1-main/view?region=us-east-1
      icon: dashboard
    - title: ArgoCD — mys
      url: https://argocd.dep.altimetrik.io/applications/v7-commerce-cart-app-service-mys
      icon: cloud
    - title: ArgoCD — sg
      url: https://argocd.dep.altimetrik.io/applications/v7-commerce-cart-app-service-sg
      icon: cloud
    - title: ArgoCD — tw
      url: https://argocd.dep.altimetrik.io/applications/v7-commerce-cart-app-service-tw
      icon: cloud
    - title: ECR repo (us-east-1)
      url: https://us-east-1.console.aws.amazon.com/ecr/repositories/private/v7-commerce-cart-app-service?region=us-east-1
      icon: docs
    - title: CloudWatch logs (us-east-1)
      url: https://us-east-1.console.aws.amazon.com/cloudwatch/home?region=us-east-1#logsV2:log-groups/log-group/%2Faws%2Fecs%2Fv7-commerce-cart-app-service
      icon: docs
  tags:
    - fastify
    - nodejs
    - cart
    - commerce
    - apac
spec:
  type: service
  lifecycle: production
  owner: group:default/nextgen-cart-team
  system: cart
  providesApis:
    - cart-rest-v1
  consumesApis:
    - account-appservice-rest-v1
  dependsOn:
    - resource:cart-dynamodb-table
    - component:commerce-account-appservice
